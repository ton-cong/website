services:
  # MySQL Database (Running as a Docker service)
  - type: web
    name: lapton-db
    env: image
    image:
      url: mysql:8.0
    plan: free
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: 123456
      - key: MYSQL_DATABASE
        value: lapton
      - key: MYSQL_TCP_PORT
        value: 3306

  # Spring Boot Backend
  - type: web
    name: tquad-backend
    env: docker
    dockerContext: ./BackEnd
    dockerfilePath: ./BackEnd/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://lapton-db:3306/lapton?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: 123456
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
