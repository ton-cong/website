services:
  # MySQL Database
  - type: database
    name: lapton-db
    databaseName: lapton
    user: root
    plan: free

  # Spring Boot Backend
  - type: web
    name: tquad-backend
    env: docker
    dockerContext: ./BackEnd
    dockerfilePath: ./BackEnd/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: lapton-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: lapton-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: lapton-db
          property: password
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
